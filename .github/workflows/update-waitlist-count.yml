name: Update waitlist count

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "waitlist-count.js"
      - ".github/workflows/update-waitlist-count.yml"
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update waitlist count from Tally
        env:
          TALLY_API_KEY: ${{ secrets.TALLY_API_KEY }}
          TALLY_FORM_ID: ${{ vars.TALLY_FORM_ID || 'lbK7xV' }}
        run: |
          node <<'NODE'
          const fs = require('node:fs/promises');

          async function main() {
            const apiKey = process.env.TALLY_API_KEY;
            const formId = process.env.TALLY_FORM_ID;

            if (!apiKey) {
              throw new Error('Missing TALLY_API_KEY repository secret.');
            }

            if (!formId) {
              throw new Error('Missing TALLY_FORM_ID repository variable.');
            }

            const response = await fetch(`https://api.tally.so/forms/${formId}/submissions?limit=1`, {
              headers: {
                Authorization: `Bearer ${apiKey}`,
                'Content-Type': 'application/json',
              },
            });

            if (!response.ok) {
              const body = await response.text();
              throw new Error(`Tally count request failed with ${response.status}: ${body}`);
            }

            const data = await response.json();
            const totals = data.totalNumberOfSubmissionsPerFilter;
            const count = totals?.completed ?? totals?.all;

            if (!Number.isInteger(count) || count < 0) {
              throw new Error('Tally response did not include a valid submission count.');
            }

            await fs.writeFile(
              'waitlist-count.json',
              `${JSON.stringify({ count, source: 'tally', updatedAt: new Date().toISOString() }, null, 2)}\n`
            );
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit updated count
        run: |
          if git diff --quiet -- waitlist-count.json; then
            echo "Waitlist count is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add waitlist-count.json
          git commit -m "Update waitlist count"
          git push
